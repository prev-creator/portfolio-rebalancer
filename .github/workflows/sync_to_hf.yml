name: Sync to HuggingFace Hub
on:
  push:
    branches: [main]

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to HuggingFace Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://waveflow:$HF_TOKEN@huggingface.co/spaces/waveflow/portfolio-rebalancer
          # Remove images folder from the push using a temporary branch
          git rm -r --cached images/
          git commit -m "ci: exclude images from HF sync" || echo "Nothing to commit"
          git push hf main --force
