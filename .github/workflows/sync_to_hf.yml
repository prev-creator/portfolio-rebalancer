name: Sync to HuggingFace Hub
on:
  push:
    branches: [main]

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Push to HuggingFace Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://waveflow:$HF_TOKEN@huggingface.co/spaces/waveflow/portfolio-rebalancer
          git push hf main --force
